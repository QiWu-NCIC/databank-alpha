name: Import SPMV result submission

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to import
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  import-spmv-result:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.title, '[SPMV Result]') ||
      (contains(github.event.issue.labels.*.name, 'result-submission') &&
      contains(github.event.issue.labels.*.name, 'spmv'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch issue for manual run
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          mkdir -p .github/tmp
          gh issue view "$ISSUE_NUMBER" --json number,body,title,labels > .github/tmp/manual-issue-event.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const issue = JSON.parse(fs.readFileSync(".github/tmp/manual-issue-event.json", "utf8"));
          fs.writeFileSync(
            ".github/tmp/manual-event.json",
            JSON.stringify({ issue }, null, 2),
          );
          NODE

      - name: Extract submitted CSV
        id: csv
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          ISSUE_EVENT_PATH: ${{ github.event_name == 'workflow_dispatch' && '.github/tmp/manual-event.json' || github.event_path }}
          OUTPUT_DIR: public/issue_download
        run: node scripts/extract-spmv-issue-csv.mjs

      - name: Prepare import summary directory
        run: mkdir -p .github/tmp

      - name: Validate import
        run: node scripts/import-spmv-long-form.mjs "${{ steps.csv.outputs.csv_path }}" --dry-run | tee .github/tmp/import-dry-run.json

      - name: Import results
        run: node scripts/import-spmv-long-form.mjs "${{ steps.csv.outputs.csv_path }}" | tee .github/tmp/import-summary.json

      - name: Check changes
        id: changes
        run: |
          if git diff --quiet -- public/file/SPMV.csv public/issue_download; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create import branch
        if: steps.changes.outputs.changed == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          branch="auto/import-spmv-result-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add public/file/SPMV.csv public/issue_download
          git commit -m "Import SPMV results from issue #${ISSUE_NUMBER}"
          git push --force-with-lease origin "$branch"
          echo "IMPORT_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Open or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          node --input-type=module <<'NODE'
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
          const branch = process.env.IMPORT_BRANCH;
          const issueNumber = process.env.ISSUE_NUMBER;
          const baseBranch = "${{ github.event.repository.default_branch }}";
          const title = `Import SPMV results from issue #${issueNumber}`;
          const body = [
            `Imports SPMV result CSV from #${issueNumber}.`,
            "",
            "CSV source: ${{ steps.csv.outputs.csv_source }}",
            "",
            "This PR was generated automatically. Review the diff in public/file/SPMV.csv before merging.",
          ].join("\n");
          const headers = {
            Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
            Accept: "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
          };
          const apiBase = `https://api.github.com/repos/${owner}/${repo}`;
          const compareUrl = `https://github.com/${owner}/${repo}/compare/${baseBranch}...${branch}?expand=1`;

          try {
            const listUrl = new URL(`${apiBase}/pulls`);
            listUrl.searchParams.set("state", "open");
            listUrl.searchParams.set("head", `${owner}:${branch}`);
            const existing = await githubJson(listUrl, { headers });

            if (existing.length) {
              await githubJson(`${apiBase}/pulls/${existing[0].number}`, {
                method: "PATCH",
                headers,
                body: JSON.stringify({ title, body }),
              });
              console.log(`Updated PR #${existing[0].number}`);
            } else {
              const created = await githubJson(`${apiBase}/pulls`, {
                method: "POST",
                headers,
                body: JSON.stringify({
                  title,
                  head: branch,
                  base: baseBranch,
                  body,
                }),
              });
              console.log(`Created PR #${created.number}`);
            }
          } catch (error) {
            console.log(`Automatic PR creation failed: ${error.message}`);
            console.log(`Create the PR manually: ${compareUrl}`);
            await writeJobSummary(compareUrl);
            await commentIssue(compareUrl);
          }

          async function githubJson(url, options) {
            const response = await fetch(url, options);
            const text = await response.text();
            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}: ${text}`);
            }
            return text ? JSON.parse(text) : null;
          }

          async function commentIssue(url) {
            try {
              await githubJson(`${apiBase}/issues/${issueNumber}/comments`, {
                method: "POST",
                headers,
                body: JSON.stringify({
                  body: [
                    "The result CSV was imported and pushed to an import branch, but this repository does not allow GitHub Actions to create pull requests.",
                    "",
                    `Create the PR manually: ${url}`,
                  ].join("\n"),
                }),
              });
            } catch (error) {
              console.log(`Issue comment fallback also failed: ${error.message}`);
            }
          }

          async function writeJobSummary(url) {
            if (!process.env.GITHUB_STEP_SUMMARY) {
              return;
            }
            const fs = await import("node:fs/promises");
            await fs.appendFile(
              process.env.GITHUB_STEP_SUMMARY,
              [
                "### Manual pull request required",
                "",
                "The import branch was pushed, but repository settings do not allow GitHub Actions to create pull requests.",
                "",
                `[Create PR](${url})`,
                "",
              ].join("\n"),
            );
          }
          NODE

      - name: Comment when no changes
        if: steps.changes.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "The submitted CSV was valid, but importing it did not change public/file/SPMV.csv."
