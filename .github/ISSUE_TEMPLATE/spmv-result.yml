name: SPMV Result Submission
description: Submit benchmark results for the SpMV databank.
title: "[SPMV Result] "
labels: ["result-submission", "spmv"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in the metadata below and provide the benchmark result as long-form CSV.
        Each CSV row should contain one matrix result.
        You can download a template from `https://qiwu-ncic.github.io/databank-web/file/SPMV-template.csv`.
        Preferred: paste the CSV content into `Result CSV`.
        Alternative: upload the completed CSV template in `CSV upload`.

  - type: input
    id: kernel
    attributes:
      label: Kernel
      description: Kernel or implementation name shown in the result table.
      placeholder: "e.g. cuSparse-12.2-CSR-ALG0"
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: Source code URL
      description: Link to the implementation, repository, commit, or release.
      placeholder: "https://github.com/..."
    validations:
      required: true

  - type: input
    id: machine_compiler
    attributes:
      label: Machine&Compiler
      description: Hardware and software environment used to run the benchmark.
      placeholder: "e.g. NV-A100 / CUDA 12.2 / GCC 11"
    validations:
      required: true

  - type: dropdown
    id: data_type
    attributes:
      label: DataType
      options:
        - double
        - single
        - other
    validations:
      required: true

  - type: input
    id: time_phase
    attributes:
      label: time phase
      description: Benchmark phase used by the result.
      placeholder: "e.g. solve_only"
    validations:
      required: true

  - type: dropdown
    id: open_source
    attributes:
      label: openSource
      options:
        - "Y"
        - "N"
    validations:
      required: true

  - type: input
    id: matrix_all
    attributes:
      label: Matrix-all
      description: Geometric mean speedup or aggregate score shown in the bar chart.
      placeholder: "e.g. 1.23"
    validations:
      required: true

  - type: textarea
    id: result_csv
    attributes:
      label: Result CSV
      description: Paste the long-form CSV header row and one or more result rows. This is preferred for automatic import. If you upload a CSV file below instead, write `uploaded` here.
      placeholder: |
        Kernel,Machine&Compiler,DataType,Baseline tag,openSource,time phase,Matrix-all,Matrix,Time
        MyKernel,NV-A100 / CUDA 12.2,double,F,Y,solve_only,1.23,12month1,0.01
        MyKernel,NV-A100 / CUDA 12.2,double,F,Y,solve_only,1.23,130bit,0.02
    validations:
      required: true

  - type: textarea
    id: csv_upload
    attributes:
      label: CSV upload
      description: Optional. Drag and drop the completed long-form CSV template here if you do not paste the CSV content above.
      placeholder: "Upload the completed CSV template here, or leave this blank if you pasted the CSV above."
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add reproduction steps, command lines, commit hashes, or any special benchmark settings. Attach large logs here only when needed.
      placeholder: "Optional"
    validations:
      required: false
