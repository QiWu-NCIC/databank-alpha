name: SPMV Result Submission
description: Submit benchmark results for the SpMV databank.
title: "[SPMV Result] "
labels: ["result-submission", "spmv"]
body:
  - type: markdown
    attributes:
      value: |
        Please submit benchmark results as long-form CSV. The CSV is the source of truth for result metadata and timing values.
        Each CSV row should contain one matrix result.

        Required CSV columns:
        `Kernel,Machine&Compiler,DataType,Baseline tag,openSource,time phase,Matrix-all,Matrix,Time`

        Matrix names are read from the `Matrix` column. They do not need to match `public/file/SPMV.csv` headers exactly.
        Existing matrix names update existing columns; new matrix names are reviewed and can be imported as new columns.

        You can download a template from `https://qiwu-ncic.github.io/databank-alpha/file/SPMV-template.csv`.
        Preferred: upload the completed CSV in `Result CSV upload`.
        Fallback: paste the CSV content into `Result CSV text`.
        After submission, a GitHub Action will save the submitted CSV under `public/issue_download/`, validate it, and open a pull request that updates `public/file/SPMV.csv`.

  - type: dropdown
    id: operator
    attributes:
      label: Operator
      description: Operator covered by this result CSV.
      options:
        - SPMV
        - SPMM
        - Other
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: Source code URL
      description: Optional. Link to the implementation, repository, commit, release, or benchmark scripts.
      placeholder: "https://github.com/..."
    validations:
      required: false

  - type: textarea
    id: csv_upload
    attributes:
      label: Result CSV upload
      description: Preferred. Drag and drop the completed long-form CSV file here.
      placeholder: "Upload the completed CSV file here."
    validations:
      required: false

  - type: textarea
    id: result_csv
    attributes:
      label: Result CSV text
      description: Optional fallback. Paste the long-form CSV header row and one or more result rows if you do not upload a CSV file above.
      placeholder: |
        Kernel,Machine&Compiler,DataType,Baseline tag,openSource,time phase,Matrix-all,Matrix,Time
        MyKernel,NVIDIA GeForce RTX 5090 / Triton 3.6.0,double,F,Y,solve_only,1.23,12month1,0.01
        MyKernel,NVIDIA GeForce RTX 5090 / Triton 3.6.0,double,F,Y,solve_only,1.23,130bit,0.02
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add reproduction steps, command lines, commit hashes, or any special benchmark settings. Attach large logs here only when needed.
      placeholder: "Optional"
    validations:
      required: false
